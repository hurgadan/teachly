name: Publish Contracts

on:
  push:
    branches: [main]
    paths:
      - 'backend/src/_contracts/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/src/_contracts

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@hurgadan'

      - name: Install TypeScript
        run: npm install --no-save typescript@~5.9.0

      - name: Build
        run: npm run build

      - name: Bump version
        id: bump
        working-directory: .
        run: .github/scripts/bump-version.sh backend/src/_contracts/package.json

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/src/_contracts/package.json
          git diff --cached --quiet || git commit -m "chore: bump contracts to v${{ steps.bump.outputs.version }}"
          git push
