services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teachly_test
      POSTGRES_USER: teachly
      POSTGRES_PASSWORD: teachly
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-api:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: test
      APP_NAME: teachly-backend-test
      DB_HOST: postgres
      DB_PORT: 5432
      DB_LOGIN: teachly
      DB_PASSWORD: teachly
      DB_NAME: teachly_test
      DB_ENABLE_LOGGING: "false"
      JWT_SECRET: test-secret
      ACCESS_TOKEN_EXPIRES: 1h

